<svg xmlns="http://www.w3.org/2000/svg" width="960" height="480" viewBox="0 0 960 480">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101827"/><stop offset="1" stop-color="#18243a"/></linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#7c8da7"/><stop offset="1" stop-color="#3b4c67"/></linearGradient>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#61dafb"/></marker>
    <marker id="arrowGold" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#ffd166"/></marker>
    <filter id="shadow"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-opacity=".28"/></filter>
  </defs>
  <rect width="960" height="480" rx="22" fill="url(#bg)"/>
  <text x="48" y="54" fill="#f3f7ff" font-size="24" font-weight="700" font-family="sans-serif">相同几何，不同着色法线</text>
  <text x="48" y="83" fill="#9eb0cb" font-size="15" font-family="sans-serif">法线贴图改变光照方向，但不会改变模型轮廓</text>
  <g filter="url(#shadow)">
    <rect x="48" y="110" width="408" height="318" rx="18" fill="#202e46" stroke="#344865"/>
    <rect x="504" y="110" width="408" height="318" rx="18" fill="#202e46" stroke="#344865"/>
  </g>
  <text x="72" y="145" fill="#d9e4f5" font-size="18" font-weight="700" font-family="sans-serif">只使用顶点法线</text>
  <text x="528" y="145" fill="#d9e4f5" font-size="18" font-weight="700" font-family="sans-serif">叠加法线贴图</text>
  <g>
    <path d="M82 331C160 307 267 341 422 311L422 367L82 367Z" fill="url(#surface)" stroke="#a9b6ca" stroke-width="2"/>
    <line x1="150" y1="325" x2="150" y2="218" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <line x1="254" y1="327" x2="254" y2="220" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <line x1="360" y1="322" x2="360" y2="215" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="132" y="204" fill="#61dafb" font-size="16" font-weight="700" font-family="sans-serif">N</text>
    <line x1="104" y1="188" x2="169" y2="263" stroke="#ffd166" stroke-width="4" marker-end="url(#arrowGold)"/>
    <text x="91" y="179" fill="#ffd166" font-size="16" font-weight="700" font-family="sans-serif">L</text>
    <text x="103" y="399" fill="#9eb0cb" font-size="14" font-family="sans-serif">表面明暗变化平缓</text>
  </g>
  <g>
    <path d="M538 331C616 307 723 341 878 311L878 367L538 367Z" fill="url(#surface)" stroke="#a9b6ca" stroke-width="2"/>
    <line x1="606" y1="325" x2="579" y2="221" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <line x1="710" y1="327" x2="742" y2="225" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <line x1="816" y1="322" x2="786" y2="218" stroke="#61dafb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <line x1="560" y1="188" x2="625" y2="263" stroke="#ffd166" stroke-width="4" marker-end="url(#arrowGold)"/>
    <text x="547" y="179" fill="#ffd166" font-size="16" font-weight="700" font-family="sans-serif">L</text>
    <path d="M564 351Q606 284 648 351Q690 398 732 332Q774 278 856 348L856 367L564 367Z" fill="#61dafb" opacity=".15"/>
    <text x="559" y="399" fill="#9eb0cb" font-size="14" font-family="sans-serif">轮廓相同，光照呈现凹凸细节</text>
  </g>
</svg>
