<svg xmlns="http://www.w3.org/2000/svg" width="960" height="410" viewBox="0 0 960 410">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101827"/><stop offset="1" stop-color="#17253c"/></linearGradient>
    <linearGradient id="dx" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#8072e8"/><stop offset=".48" stop-color="#817fff"/><stop offset=".52" stop-color="#7f8bff"/><stop offset="1" stop-color="#79a1ff"/></linearGradient>
    <linearGradient id="gl" x1="0" y1="0" x2="0" y2="1"><stop stop-color="#79a1ff"/><stop offset=".48" stop-color="#7f8bff"/><stop offset=".52" stop-color="#817fff"/><stop offset="1" stop-color="#8072e8"/></linearGradient>
    <marker id="up" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#71df98"/></marker>
  </defs>
  <rect width="960" height="410" rx="22" fill="url(#bg4)"/>
  <text x="48" y="54" fill="#f3f7ff" font-size="24" font-weight="700" font-family="sans-serif">DirectX 与 OpenGL：绿色通道方向相反</text>
  <text x="48" y="84" fill="#9eb0cb" font-size="15" font-family="sans-serif">同一份切线空间法线只需翻转 G 通道，但必须匹配引擎约定</text>
  <g transform="translate(92 119)">
    <rect width="270" height="205" rx="16" fill="#202e46" stroke="#3a4e6c"/>
    <rect x="24" y="24" width="120" height="120" rx="12" fill="url(#dx)"/>
    <line x1="204" y1="128" x2="204" y2="52" stroke="#71df98" stroke-width="5" marker-end="url(#up)"/>
    <text x="225" y="90" fill="#71df98" font-size="17" font-weight="700" font-family="sans-serif">Y−</text>
    <text x="24" y="177" fill="#d9e4f5" font-size="18" font-weight="700" font-family="sans-serif">DirectX</text>
  </g>
  <g transform="translate(410 177)">
    <rect width="140" height="70" rx="35" fill="#263752" stroke="#557093"/>
    <text x="25" y="31" fill="#9eb0cb" font-size="13" font-family="sans-serif">翻转绿色通道</text>
    <text x="36" y="54" fill="#71df98" font-size="18" font-weight="700" font-family="monospace">G = 1 - G</text>
  </g>
  <g transform="translate(598 119)">
    <rect width="270" height="205" rx="16" fill="#202e46" stroke="#3a4e6c"/>
    <rect x="24" y="24" width="120" height="120" rx="12" fill="url(#gl)"/>
    <line x1="204" y1="128" x2="204" y2="52" stroke="#71df98" stroke-width="5" marker-end="url(#up)"/>
    <text x="225" y="90" fill="#71df98" font-size="17" font-weight="700" font-family="sans-serif">Y+</text>
    <text x="24" y="177" fill="#d9e4f5" font-size="18" font-weight="700" font-family="sans-serif">OpenGL</text>
  </g>
  <text x="48" y="375" fill="#ffd166" font-size="14" font-family="sans-serif">典型现象：格式用错后，朝上的凸起会像凹陷，垂直方向的受光发生颠倒。</text>
</svg>
