<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="480" viewBox="0 0 1000 480">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#101827"/><stop offset="1" stop-color="#192942"/></linearGradient>
    <marker id="eye" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0L8 4L0 8Z" fill="#ffd166"/></marker>
  </defs>
  <rect width="1000" height="480" rx="22" fill="url(#bg3)"/>
  <text x="48" y="54" fill="#f3f7ff" font-size="24" font-weight="700" font-family="sans-serif">透明排序为什么会出错</text>
  <text x="48" y="84" fill="#9eb0cb" font-size="15" font-family="sans-serif">引擎通常按对象中心排序，但正确混合顺序实际取决于每个片元的深度</text>
  <g transform="translate(45 125)">
    <rect width="430" height="305" rx="18" fill="#202f48" stroke="#3a506e"/>
    <text x="24" y="35" fill="#dbe7f7" font-size="18" font-weight="700" font-family="sans-serif">对象没有交叉：排序可行</text>
    <path d="M45 254L94 227L94 281Z" fill="#ffd166"/>
    <line x1="100" y1="254" x2="360" y2="254" stroke="#ffd166" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#eye)"/>
    <rect x="182" y="89" width="40" height="172" rx="10" fill="#4fa7ff" opacity=".58" stroke="#8ac7ff" stroke-width="2"/>
    <rect x="299" y="89" width="40" height="172" rx="10" fill="#ff6681" opacity=".58" stroke="#ff9cae" stroke-width="2"/>
    <circle cx="202" cy="175" r="6" fill="#8ac7ff"/><circle cx="319" cy="175" r="6" fill="#ff9cae"/>
    <text x="158" y="292" fill="#9eb0cb" font-size="13" font-family="sans-serif">近：蓝</text><text x="284" y="292" fill="#9eb0cb" font-size="13" font-family="sans-serif">远：红</text>
  </g>
  <g transform="translate(525 125)">
    <rect width="430" height="305" rx="18" fill="#202f48" stroke="#3a506e"/>
    <text x="24" y="35" fill="#dbe7f7" font-size="18" font-weight="700" font-family="sans-serif">对象交叉：不存在统一顺序</text>
    <path d="M45 254L94 227L94 281Z" fill="#ffd166"/>
    <line x1="100" y1="254" x2="370" y2="254" stroke="#ffd166" stroke-width="3" stroke-dasharray="8 6" marker-end="url(#eye)"/>
    <g transform="rotate(-22 250 177)"><rect x="133" y="157" width="235" height="40" rx="10" fill="#4fa7ff" opacity=".58" stroke="#8ac7ff" stroke-width="2"/></g>
    <g transform="rotate(22 250 177)"><rect x="133" y="157" width="235" height="40" rx="10" fill="#ff6681" opacity=".58" stroke="#ff9cae" stroke-width="2"/></g>
    <circle cx="250" cy="177" r="7" fill="#fff"/>
    <path d="M161 105Q250 65 340 105" fill="none" stroke="#ffcf66" stroke-width="2" stroke-dasharray="6 5"/>
    <text x="123" y="292" fill="#ffd166" font-size="13" font-family="sans-serif">不同区域的前后关系相反</text>
  </g>
</svg>
