<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="650" viewBox="0 0 1200 650" role="img" aria-labelledby="title desc">
  <title id="title">三角形光栅化与片元处理</title>
  <desc id="desc">屏幕空间三角形经过覆盖测试和属性插值产生片元，再经过片元着色、深度模板测试和混合。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbf9ff"/>
      <stop offset="1" stop-color="#eef7f6"/>
    </linearGradient>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M36 0H0V36" fill="none" stroke="#b9c4cf" stroke-width="1"/>
      <circle cx="18" cy="18" r="2.5" fill="#8e9aa7"/>
    </pattern>
    <marker id="arr2" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M1 1L11 6L1 11Z" fill="#77758b"/>
    </marker>
    <filter id="sh2" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="10" flood-color="#4a566b" flood-opacity="0.14"/>
    </filter>
    <clipPath id="triClip">
      <path d="M115 486L292 164L485 486Z"/>
    </clipPath>
  </defs>
  <rect width="1200" height="650" rx="28" fill="url(#bg2)"/>
  <text x="66" y="69" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif" font-size="29" font-weight="700" fill="#303241">从三角形到最终颜色</text>
  <text x="66" y="104" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif" font-size="17" fill="#6f7180">覆盖只是候选，片元还要经过着色、测试和混合</text>

  <rect x="70" y="135" width="455" height="405" rx="23" fill="#ffffff" opacity="0.72" filter="url(#sh2)"/>
  <rect x="88" y="145" width="420" height="360" fill="url(#grid)"/>
  <path d="M115 486L292 164L485 486Z" fill="#d8c7ff" fill-opacity="0.65" stroke="#7656b0" stroke-width="4"/>
  <g clip-path="url(#triClip)" fill="#7350aa">
    <circle cx="126" cy="468" r="6"/><circle cx="162" cy="468" r="6"/><circle cx="198" cy="468" r="6"/><circle cx="234" cy="468" r="6"/><circle cx="270" cy="468" r="6"/><circle cx="306" cy="468" r="6"/><circle cx="342" cy="468" r="6"/><circle cx="378" cy="468" r="6"/><circle cx="414" cy="468" r="6"/><circle cx="450" cy="468" r="6"/>
    <circle cx="162" cy="432" r="6"/><circle cx="198" cy="432" r="6"/><circle cx="234" cy="432" r="6"/><circle cx="270" cy="432" r="6"/><circle cx="306" cy="432" r="6"/><circle cx="342" cy="432" r="6"/><circle cx="378" cy="432" r="6"/><circle cx="414" cy="432" r="6"/>
    <circle cx="162" cy="396" r="6"/><circle cx="198" cy="396" r="6"/><circle cx="234" cy="396" r="6"/><circle cx="270" cy="396" r="6"/><circle cx="306" cy="396" r="6"/><circle cx="342" cy="396" r="6"/><circle cx="378" cy="396" r="6"/><circle cx="414" cy="396" r="6"/>
    <circle cx="198" cy="360" r="6"/><circle cx="234" cy="360" r="6"/><circle cx="270" cy="360" r="6"/><circle cx="306" cy="360" r="6"/><circle cx="342" cy="360" r="6"/><circle cx="378" cy="360" r="6"/>
    <circle cx="198" cy="324" r="6"/><circle cx="234" cy="324" r="6"/><circle cx="270" cy="324" r="6"/><circle cx="306" cy="324" r="6"/><circle cx="342" cy="324" r="6"/><circle cx="378" cy="324" r="6"/>
    <circle cx="234" cy="288" r="6"/><circle cx="270" cy="288" r="6"/><circle cx="306" cy="288" r="6"/><circle cx="342" cy="288" r="6"/>
    <circle cx="234" cy="252" r="6"/><circle cx="270" cy="252" r="6"/><circle cx="306" cy="252" r="6"/><circle cx="342" cy="252" r="6"/>
    <circle cx="270" cy="216" r="6"/><circle cx="306" cy="216" r="6"/>
    <circle cx="270" cy="180" r="6"/><circle cx="306" cy="180" r="6"/>
  </g>
  <text x="93" y="573" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif" font-size="18" font-weight="650" fill="#49465a">1 · 覆盖测试：找出三角形覆盖的采样点</text>

  <path d="M542 335H610" stroke="#77758b" stroke-width="3" marker-end="url(#arr2)"/>

  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans SC',sans-serif">
    <rect x="625" y="150" width="230" height="96" rx="18" fill="#e4efff" stroke="#bad3f2" stroke-width="2"/>
    <text x="650" y="186" font-size="19" font-weight="700" fill="#324e70">属性插值</text>
    <text x="650" y="217" font-size="15" fill="#52677e">UV · 法线 · 顶点色 · 深度</text>

    <rect x="625" y="276" width="230" height="96" rx="18" fill="#e5f6ef" stroke="#b9e2d0" stroke-width="2"/>
    <text x="650" y="312" font-size="19" font-weight="700" fill="#315e50">片元着色</text>
    <text x="650" y="343" font-size="15" fill="#506f65">纹理 · 材质 · 光照</text>

    <rect x="625" y="402" width="230" height="96" rx="18" fill="#fff0dd" stroke="#efd0a7" stroke-width="2"/>
    <text x="650" y="438" font-size="19" font-weight="700" fill="#73502b">深度 / 模板</text>
    <text x="650" y="469" font-size="15" fill="#80684e">不可见的候选片元被丢弃</text>

    <path d="M740 246V266" stroke="#77758b" stroke-width="3" marker-end="url(#arr2)"/>
    <path d="M740 372V392" stroke="#77758b" stroke-width="3" marker-end="url(#arr2)"/>
    <path d="M865 450H918" stroke="#77758b" stroke-width="3" marker-end="url(#arr2)"/>

    <rect x="930" y="276" width="205" height="222" rx="22" fill="#f1e9fa" stroke="#d6c1ea" stroke-width="2" filter="url(#sh2)"/>
    <text x="958" y="320" font-size="19" font-weight="700" fill="#5d4278">输出合并</text>
    <text x="958" y="358" font-size="16" fill="#695a76">Blend</text>
    <text x="958" y="390" font-size="16" fill="#695a76">Color Mask</text>
    <text x="958" y="422" font-size="16" fill="#695a76">Depth / Stencil Write</text>
    <rect x="958" y="449" width="149" height="26" rx="7" fill="#b994d9"/>
    <text x="930" y="535" font-size="18" font-weight="650" fill="#49465a">2 · 写入 Render Target</text>
  </g>
</svg>
